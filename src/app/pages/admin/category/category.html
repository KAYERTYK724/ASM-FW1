<div class="row g-3">

  <!-- FORM -->
  <div class="col-md-4">
    <div class="card shadow-sm border-0">
      <div class="card-header bg-white fw-bold">
        {{ isEdit ? 'Cập nhật danh mục' : 'Thêm danh mục' }}
      </div>

      <div class="card-body">

        <div class="mb-3">
          <label class="form-label">Tên danh mục</label>
          <input [(ngModel)]="form.name"
                 class="form-control"
                 placeholder="Nhập tên danh mục">
        </div>

        <div class="mb-3">
          <label class="form-label">Danh mục cha</label>
          <select [(ngModel)]="form.parent_id" class="form-select">
            <option [ngValue]="null">Không có</option>
            <option *ngFor="let c of categories" [ngValue]="c.id">
              {{ c.name }}
            </option>
          </select>
        </div>

        <button class="btn btn-primary w-100" (click)="submitForm()">
          {{ isEdit ? 'Cập nhật' : 'Thêm mới' }}
        </button>

        <button *ngIf="isEdit"
                class="btn btn-secondary w-100 mt-2"
                (click)="resetForm()">
          Hủy
        </button>

      </div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="col-md-8">
    <div class="card shadow-sm border-0">
      <div class="card-header bg-white fw-bold">
        Danh sách danh mục
      </div>

      <div class="card-body">

        <!-- Loading -->
        <div *ngIf="loading">Đang tải dữ liệu...</div>

        <!-- Empty -->
        <div *ngIf="!loading && categories.length === 0">
          Không có dữ liệu
        </div>

        <!-- Table -->
        <table class="table table-hover align-middle"
               *ngIf="categories.length > 0">

          <thead class="table-light">
            <tr>
              <th>ID</th>
              <th>Tên</th>
              <th>Parent</th>
              <th width="150">Hành động</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let c of categories">
              <td>{{ c.id }}</td>
              <td>{{ c.name }}</td>
              <td>{{ c.parent_id }}</td>

              <td>
                <button class="btn btn-sm btn-warning me-2"
                        (click)="editCategory(c)">
                  Sửa
                </button>

                <button class="btn btn-sm btn-danger"
                        (click)="deleteCategory(c.id)">
                  Xóa
                </button>
              </td>
            </tr>
          </tbody>

        </table>

      </div>
    </div>
  </div>

</div>
