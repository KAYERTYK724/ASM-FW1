<div class="inventory-container container mt-5 pb-5">

  <div class="header-section d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">Chỉnh sửa danh mục</h2>

    <button class="btn btn-back" (click)="router.navigate(['/admin/category'])">
      <i class="bi bi-arrow-left me-1"></i>
      Quay lại
    </button>
  </div>

  <div class="card shadow-sm border-0 p-4">

    <form [formGroup]="categoryForm" (ngSubmit)="onSubmit()">

      <div class="row">

        <!-- NAME -->
        <div class="col-md-12 mb-4">
          <label class="form-label fw-bold">
            Tên danh mục <span class="text-danger">*</span>
          </label>

          <input type="text" class="form-control" formControlName="name" [class.is-invalid]="isInvalid('name')" />

          @if (isInvalid('name')) {
          <div class="invalid-feedback">
            Tên danh mục tối thiểu 3 ký tự
          </div>
          }
        </div>

        <!-- STATUS -->
        <div class="col-md-12 mb-4">
          <label class="form-label fw-bold">Trạng thái</label>

          <select class="form-select" formControlName="status">
            <option [value]="true">Hiển thị</option>
            <option [value]="false">Ẩn</option>
          </select>
        </div>

      </div>

      <div class="actions-footer mt-3">
        <button type="submit" class="btn btn-outline-warning me-2">
          Cập nhật danh mục
        </button>
        <button type="button" class="btn btn-dark-grey" (click)="router.navigate(['/admin/category'])">
          Hủy
        </button>
      </div>

    </form>

  </div>

</div>
