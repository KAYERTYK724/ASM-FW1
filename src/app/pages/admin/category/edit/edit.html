<div class="container-fluid p-4">

  <h4 class="fw-bold mb-4">Cập nhật danh mục</h4>

  <div class="card p-4 shadow-sm">

    <!-- TÊN -->
    <div class="mb-3">
      <label class="form-label">Tên danh mục</label>
      <input type="text" class="form-control" [(ngModel)]="category.name" name="name" placeholder="Nhập tên danh mục">
    </div>

    <!-- DANH MỤC CHA -->
    <div class="mb-3">
      <label class="form-label">Danh mục cha</label>

      <select class="form-select" [(ngModel)]="category.parent_id" name="parent_id">
        <option [ngValue]="null">Không có</option>

        @for (c of listCategory(); track c.id) {
        @if (c.id !== categoryId) {
        <option [ngValue]="c.id">
          {{ c.name }}
        </option>
        }
        }
      </select>
    </div>

    <!-- STATUS -->
    <div class="mb-3">
      <label class="form-label">Trạng thái</label>

      <select class="form-select" [(ngModel)]="category.status" name="status">
        <option [ngValue]="true">Hoạt động</option>
        <option [ngValue]="false">Ẩn</option>
      </select>
    </div>

    <!-- BUTTON -->
    <div class="d-flex gap-2">
      <button class="btn btn-primary" (click)="onSubmit()">
        Cập nhật
      </button>

      <button type="button" class="btn btn-secondary" (click)="goToCategory()">
        Quay lại
      </button>
    </div>
  </div>

</div>
