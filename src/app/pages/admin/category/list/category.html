<div class="container-fluid p-4">

  <div class="d-flex justify-content-between mb-4">
    <h4 class="fw-bold">Quản lý danh mục</h4>

    <button type="button" routerLink="/admin/category/add" class="btn btn-danger">
      <i class="bi bi-plus me-1"></i>
      Thêm danh mục
    </button>
  </div>

  <div class="card shadow-sm p-3">

    <table class="table align-middle table-hover">

      <thead class="table-light">
        <tr>
          <th width="50">#</th>
          <th>Tên danh mục</th>
          <th>Danh mục cha</th>
          <th width="150">Trạng thái</th>
          <th width="150">Thao tác</th>
        </tr>
      </thead>

      <tbody>
        @for (c of dataListCategory(); track c.id) {
        <tr>

          <!-- STT -->
          <td>{{ $index + 1 }}</td>

          <!-- TÊN (có indent nếu là con) -->
          <td>
            <span *ngIf="c.parent" class="text-muted me-1">--</span>
            {{ c.name }}
          </td>

          <!-- CHA -->
          <td>
            @if (c.parent) {
              {{ c.parent.name }}
            } @else {
              <span class="text-muted">Không có</span>
            }
          </td>

          <!-- STATUS -->
          <td>
            <span class="badge rounded-pill px-3 py-2"
                  [ngClass]="c.status ? 'bg-success' : 'bg-secondary'">
              {{ c.status ? 'Hoạt động' : 'Ẩn' }}
            </span>
          </td>

          <!-- ACTION -->
          <td>
            <button
              [routerLink]="['/admin/category/edit', c.id]"
              class="btn btn-sm btn-warning me-2">
              <i class="bi bi-pencil-square"></i>
            </button>

            <button
              (click)="onDelete(c.id)"
              class="btn btn-sm btn-danger">
              <i class="bi bi-trash"></i>
            </button>
          </td>

        </tr>
        }
      </tbody>

    </table>

  </div>

</div>
