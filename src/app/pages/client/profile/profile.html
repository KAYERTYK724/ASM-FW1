<!-- PROFILE PAGE (READ-ONLY VIEW) -->
<div class="profile-page container py-5">
  <div class="row justify-content-center">

    <!-- LEFT: Avatar + Info -->
    <div class="col-lg-4">
      <div class="card profile-card text-center shadow rounded-0">
        <div class="card-body">
          <img src="https://i.pinimg.com/736x/b1/1e/b1/b11eb1d3f834fb0ad27a4445d1fb9cbd.jpg" class="profile-avatar mb-3" />
          <h4 class="fw-bold">Nguyễn Văn A</h4>
          <p class="text-muted badge bg-warning">Thành viên</p>
        </div>
      </div>
    </div>

    <!-- RIGHT: Details -->
    <div class="col-lg-8">
      <div class="card shadow profile-detail rounded-0">
        <div class="card-body">
          <h5 class="fw-bold mb-4">Thông tin cá nhân</h5>

          <div class="row mb-3">
            <div class="col-md-6">
              <label>Email</label>
              <p class="form-control-plaintext">email@gmail.com</p>
            </div>
            <div class="col-md-6">
              <label>Số điện thoại</label>
              <p class="form-control-plaintext">0123456789</p>
            </div>
          </div>
        </div>
      </div>

      <!-- ORDER HISTORY -->
      <div class="card shadow mt-4 rounded-0">
        <div class="card-body">
          <h5 class="fw-bold mb-4">Lịch sử đơn hàng</h5>

          <table class="table">
            <thead>
              <tr>
                <th>#</th>
                <th>Sản phẩm</th>
                <th>Giá</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>1</td>
                <td>Áo sơ mi trắng</td>
                <td>299.000 đ</td>
              </tr>
              <tr>
                <td>2</td>
                <td>Áo thun basic</td>
                <td>150.000 đ</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>

  </div>
</div>
