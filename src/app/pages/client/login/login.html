<div class="login-page">
  <div class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="card login-card shadow-sm">
      <div class="card-body p-5">

        <!-- LOGO -->
        <div class="text-center mb-4">
          <a href="" class="d-inline-flex align-items-center text-decoration-none text-dark fw-bold fs-3">
            <span class="text-danger">Male</span> fashion<span class="text-danger">.</span>
          </a>
        </div>

        <h5 class="text-center fw-semibold mb-4">
          Đăng nhập vào tài khoản
        </h5>

        <form class="needs-validation" novalidate>
          <!-- EMAIL -->
          <div class="mb-3">
            <label class="form-label">
              Địa chỉ Email
            </label>
            <input type="email" class="form-control" placeholder="email@example.com" required autofocus>
            <div class="invalid-feedback">
              Vui lòng nhập email hợp lệ.
            </div>
          </div>
          <!-- PASSWORD -->
          <div class="mb-3">
            <label class="form-label d-flex justify-content-between">
              Mật khẩu
            </label>
            <input type="password" class="form-control" placeholder="Nhập mật khẩu" required minlength="6">
            <div class="invalid-feedback">
              Mật khẩu tối thiểu 6 ký tự.
            </div>
          </div>

          <!-- BUTTON -->
          <button class="btn btn-login w-100">
            Đăng nhập
          </button>
        </form>

        <!-- SIGNUP -->
        <div class="text-center mt-4 small text-muted">
          Bạn chưa có tài khoản?
          <a href="register" class="signup-link">
            Đăng ký
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
