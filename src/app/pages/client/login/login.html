<div class="login-page">
  <div class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="card login-card shadow-sm">
      <div class="card-body p-5">

        <!-- LOGO -->
        <div class="text-center mb-4">
          <a class="d-inline-flex align-items-center text-decoration-none text-dark fw-bold fs-3">
            <span class="text-danger">Male</span> fashion<span class="text-danger">.</span>
          </a>
        </div>

        <h5 class="text-center fw-semibold mb-4">
          Đăng nhập vào tài khoản
        </h5>

        <!-- FORM -->
        <form [formGroup]="loginForm" (ngSubmit)="login()">

          <!-- EMAIL -->
          <div class="mb-3">
            <label class="form-label">Địa chỉ Email</label>
            <input 
              type="email"
              formControlName="email"
              class="form-control"
              placeholder="email@example.com"
            >
          </div>

          <!-- PASSWORD -->
          <div class="mb-3">
            <label class="form-label">Mật khẩu</label>
            <input 
              type="password"
              formControlName="password"
              class="form-control"
              placeholder="Nhập mật khẩu"
            >
          </div>

          <!-- ERROR -->
          <p class="text-danger text-center">
            {{ errorMessage() }}
          </p>

          <!-- BUTTON -->
          <button class="btn btn-login w-100" type="submit">
            Đăng nhập
          </button>
        </form>

        <!-- SIGNUP -->
        <div class="text-center mt-4 small text-muted">
          Bạn chưa có tài khoản?
          <a routerLink="/register" class="signup-link">
            Đăng ký
          </a>
        </div>

      </div>
    </div>
  </div>
</div>
