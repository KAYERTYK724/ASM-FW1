<!-- BLOG HERO -->
<section class="blog-hero text-center text-white d-flex align-items-center">
  <div class="container">
    <h2 class="fw-bold">Blog của chúng tôi</h2>
  </div>
</section>

<!-- BLOG SECTION -->
<section class="py-5 blog-section">
  <div class="container">
    <div class="row g-4">
      <!-- BLOG ITEM -->
      @for (b of blogs; track $index) {
      <div class="col-lg-4 col-md-6">
        <div class="card blog-card border-0">
          <img [src]="b.image" class="card-img-top">
          <div class="card-body p-0">
            <div class="blog-meta">
              <i class="bi bi-calendar"></i>
              {{ b.created_at }}
            </div>
            <h6 class="blog-title">
              {{ b.title }}
            </h6>
            <p class="text-muted small">
              {{ b.content.slice(0, 80) }}...
            </p>
            <a href="/blog-detail" class="blog-read">
              XEM THÊM
            </a>
          </div>
        </div>
      </div>
      }
    </div>
  </div>
</section>
