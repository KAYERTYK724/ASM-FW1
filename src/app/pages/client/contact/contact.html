<!-- GOOGLE MAP -->
<section class="map-section">
  <iframe src="https://www.google.com/maps?q=Can%20Tho&output=embed" width="100%" height="450" style="border:0;"
    allowfullscreen="" loading="lazy">
  </iframe>
</section>

<!-- CONTACT -->
<section class="contact-section py-5">
  <div class="container">
    <div class="row g-5">
      <!-- CONTACT INFO -->
      <div class="col-lg-6">
        <span class="contact-subtitle">
          THÔNG TIN
        </span>
        <h2 class="contact-title">
          Liên Hệ Với Chúng Tôi
        </h2>
        <p class="contact-desc">
          Là một công ty bắt đầu từ lĩnh vực nội thất cao cấp,
          chúng tôi luôn chú trọng đến từng chi tiết và chất lượng dịch vụ.
        </p>
      </div>

      <!-- CONTACT FORM -->
      <div class="col-lg-6">
        <form>
          <div class="row g-3">
            <div class="col-md-6">
              <input type="text" class="form-control" placeholder="Họ và tên">
            </div>

            <div class="col-md-6">
              <input type="email" class="form-control" placeholder="Email">
            </div>

            <div class="col-12">
              <textarea class="form-control" rows="5" placeholder="Nội dung tin nhắn"></textarea>
            </div>

            <div class="col-12">
              <button class="btn btn-dark contact-btn">
                GỬI TIN NHẮN
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
