<!-- HERO -->
<div *ngIf="blog">
  <section class="blog-hero">
    <div class="container text-center">
      <div class="row justify-content-center">
        <div class="col-lg-8">

          <h2 class="hero-title">
            {{ blog.title }}
          </h2>
        </div>
      </div>
    </div>
  </section>

  <!-- IMAGE -->
  <section class="blog-image">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-10">

          <div class="image-wrapper">
            <img [src]="blog.image" alt="Blog Image" class="img-fluid">
          </div>

        </div>
      </div>
    </div>
  </section>

  <!-- CONTENT -->
  <section class="blog-content">
    <div class="container">
      <div class="row justify-content-center">

        <!-- SHARE -->
        <div class="col-lg-1 d-none d-lg-block">
          <div class="share-bar text-center">
            <p class="share-title">SHARE</p>

            <a href="#" class="share-item facebook">
              <i class="bi bi-facebook"></i>
            </a>

            <a href="#" class="share-item twitter">
              <i class="bi bi-twitter-x"></i>
            </a>

            <a href="#" class="share-item youtube">
              <i class="bi bi-youtube"></i>
            </a>

            <a href="#" class="share-item linkedin">
              <i class="bi bi-linkedin"></i>
            </a>
          </div>
        </div>

        <!-- MAIN -->
        <div class="col-lg-8">

          <div class="blog-text">
            <p [innerHTML]="blog.content"></p>
          </div>

          <!-- NAV -->
          <div class="row post-navigation">
            <!-- PREV -->
            <div class="col-md-6" *ngIf="prevBlog">
              <div class="post-box">
                <a class="text-decoration-none text-dark" [routerLink]="['/blog-detail', prevBlog.id]">
                  <span>Bài trước</span>
                  <h6>{{ prevBlog.title }}</h6>
                </a>
              </div>
            </div>

            <!-- NEXT -->
            <div class="col-md-6 text-md-end" *ngIf="nextBlog">
              <div class="post-box">
                <a class="text-decoration-none text-dark" [routerLink]="['/blog-detail', nextBlog.id]">
                  <span>Bài tiếp theo</span>
                  <h6>{{ nextBlog.title }}</h6>
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
